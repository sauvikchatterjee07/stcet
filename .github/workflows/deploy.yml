name: Deploy STCET Frontend to TPHOST

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js (Vite 7 requires Node 20+)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install dependencies (avoid npm ci native-binding bug)
      - name: Install dependencies
        run: npm install

      # Build project
      - name: Build STCET frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      # Copy build to server
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_KEY }}
          source: "dist/*"
          target: "~/stcet-frontend"
          strip_components: 1

      # Deploy via SSH
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_KEY }}
          script: |

            echo "Updating packages..."
            sudo apt-get update


            echo "Installing nginx if missing..."
            if ! command -v nginx >/dev/null 2>&1; then
              sudo apt-get install -y nginx
            fi


            echo "Creating deployment directory..."
            sudo mkdir -p /var/www/stcet.bengalcodingacademy.com


            echo "Copying frontend build..."
            sudo cp -r ~/stcet-frontend/* /var/www/stcet.bengalcodingacademy.com/


            echo "Setting permissions..."
            sudo chown -R www-data:www-data /var/www/stcet.bengalcodingacademy.com
            sudo chmod -R 755 /var/www/stcet.bengalcodingacademy.com


            echo "Configuring nginx..."
            sudo tee /etc/nginx/sites-available/stcet.bengalcodingacademy.com <<EOL

            server {
                listen 80;
                server_name stcet.bengalcodingacademy.com;

                root /var/www/stcet.bengalcodingacademy.com;
                index index.html;

                # Security headers
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-XSS-Protection "1; mode=block" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header Referrer-Policy "no-referrer-when-downgrade" always;

                # Enable gzip
                gzip on;
                gzip_types text/plain text/css application/javascript application/json;

                # SPA routing
                location / {
                    try_files \$uri \$uri/ /index.html;
                }

                # Static caching
                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }

                # Protect hidden files
                location ~ /\. {
                    deny all;
                }
            }

            EOL


            echo "Enable nginx site..."
            sudo ln -sf /etc/nginx/sites-available/stcet.bengalcodingacademy.com \
                         /etc/nginx/sites-enabled/


            echo "Testing nginx config..."
            sudo nginx -t


            echo "Restarting nginx..."
            sudo systemctl restart nginx
            sudo systemctl enable nginx


            echo "Deployment complete!"
            echo "Visit:"
            echo "http://stcet.bengalcodingacademy.com"

      # Cleanup temp files
      - name: Cleanup temp directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_KEY }}
          script: |
            rm -rf ~/stcet-frontend
